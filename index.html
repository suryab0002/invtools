<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Hub - Multi-Tool</title>
    <style>
        :root { --primary: #1a2a6c; --accent: #f39c12; --bg: #f0f2f5; --card: #ffffff; --danger: #e74c3c; --secondary: #7f8c8d; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg); height: 100vh; overflow: hidden; }

        /* Navigation */
        .menu-btn { position: fixed; top: 15px; left: 15px; z-index: 1000; background: var(--primary); color: white; border: none; padding: 10px 12px; border-radius: 5px; cursor: pointer; }
        .sidebar { width: 250px; background: var(--primary); color: white; padding: 20px; position: fixed; height: 100%; left: -280px; transition: 0.3s ease; z-index: 999; }
        .sidebar.active { left: 0; }
        .sidebar h2 { margin-top: 50px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        .nav-item { padding: 12px; margin: 10px 0; cursor: pointer; border-radius: 6px; background: rgba(255,255,255,0.1); }
        .nav-item.active { background: var(--accent); font-weight: bold; }
        .backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 998; }
        .backdrop.active { display: block; }

        /* Workspace */
        .main-content { flex: 1; padding: 80px 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .tool-container { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); width: 100%; max-width: 450px; display: none; }
        .tool-container.active { display: block; }

        /* Inputs */
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; color: #555; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        /* Period Rows */
        .period-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .period-label { font-size: 0.8rem; color: #666; min-width: 65px; font-weight: bold; }
        .remove-btn { background: #fee; color: var(--danger); border: 1px solid #fcc; padding: 8px 10px; border-radius: 6px; cursor: pointer; }
        
        /* Action Buttons */
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .add-btn { flex: 2; background: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .reset-btn { flex: 1; background: var(--secondary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .reset-btn:hover { background: #34495e; }

        /* Results */
        .results { margin-top: 25px; padding: 20px; background: #f8fafb; border-radius: 12px; border: 1px solid #eee; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .value { font-weight: 800; color: var(--primary); }
        .profit { color: #1b5e20; } .loss { color: #b71c1c; }
        .effective-info { border-top: 1px dashed #ccc; margin-top: 10px; padding-top: 10px; font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="backdrop" id="backdrop" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <h2>Finance Hub</h2>
        <div class="nav-item active" id="nav-basic" onclick="switchTool('basic')">Simple Profit/Loss</div>
        <div class="nav-item" id="nav-multi" onclick="switchTool('multi')">Multi-Period Tracker</div>
    </div>

    <div class="main-content">
        <div id="basic" class="tool-container active">
            <h3 style="margin-top:0">Simple Investment Calc</h3>
            <div class="input-group">
                <label>Amount Invested (₹)</label>
                <input type="number" id="b-invested" placeholder="Enter amount" oninput="runBasic()">
            </div>
            <div class="input-group">
                <label>Change (%)</label>
                <input type="number" id="b-percent" placeholder="0" oninput="runBasic()">
            </div>
            <button class="reset-btn" style="width:100%" onclick="resetBasic()">Reset Fields</button>
            <div class="results">
                <div class="result-item"><span>Final Value:</span><span id="b-final" class="value">₹0</span></div>
                <div class="result-item"><span>Net Profit/Loss:</span><span id="b-profit" class="value">₹0</span></div>
            </div>
        </div>

        <div id="multi" class="tool-container">
            <h3 style="margin-top:0">Multi-Period Tracker</h3>
            <div class="input-group">
                <label>Initial Investment (₹)</label>
                <input type="number" id="m-initial" placeholder="Enter amount" oninput="calculateMulti()">
            </div>
            
            <label>Periodic Returns (%)</label>
            <div id="period-list">
                <div class="period-row">
                    <span class="period-label">Period 1</span>
                    <input type="number" class="m-input" placeholder="0" oninput="calculateMulti()">
                    <button class="remove-btn" onclick="removePeriod(this)">✕</button>
                </div>
            </div>
            
            <div class="btn-group">
                <button class="add-btn" onclick="addPeriod()">+ Add Period</button>
                <button class="reset-btn" onclick="resetMulti()">Reset</button>
            </div>

            <div class="results">
                <div class="result-item"><span>Final Amount:</span><span id="m-final" class="value">₹0</span></div>
                <div class="result-item"><span>Total Profit:</span><span id="m-profit" class="value">₹0</span></div>
                <div class="result-item effective-info">
                    <span>Effective Total Return:</span>
                    <span id="m-effective" class="value">0%</span>
                </div>
            </div>
        </div>
    </div>

<script>
    const rupeeFormatter = new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 });

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('backdrop').classList.toggle('active');
    }

    function switchTool(toolId) {
        document.querySelectorAll('.tool-container').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(toolId).classList.add('active');
        document.getElementById('nav-' + toolId).classList.add('active');
        toggleMenu();
    }

    function resetBasic() {
        document.getElementById('b-invested').value = '';
        document.getElementById('b-percent').value = '';
        runBasic();
    }

    function resetMulti() {
        document.getElementById('m-initial').value = '';
        const list = document.getElementById('period-list');
        list.innerHTML = `
            <div class="period-row">
                <span class="period-label">Period 1</span>
                <input type="number" class="m-input" placeholder="0" oninput="calculateMulti()">
                <button class="remove-btn" onclick="removePeriod(this)">✕</button>
            </div>
        `;
        calculateMulti();
    }

    function addPeriod() {
        const list = document.getElementById('period-list');
        const count = list.children.length + 1;
        const div = document.createElement('div');
        div.className = 'period-row';
        div.innerHTML = `
            <span class="period-label">Period ${count}</span>
            <input type="number" class="m-input" placeholder="0" oninput="calculateMulti()">
            <button class="remove-btn" onclick="removePeriod(this)">✕</button>
        `;
        list.appendChild(div);
        calculateMulti();
    }

    function removePeriod(btn) {
        const list = document.getElementById('period-list');
        if (list.children.length > 1) {
            btn.parentElement.remove();
            updateLabels();
            calculateMulti();
        }
    }

    function updateLabels() {
        document.querySelectorAll('.period-row').forEach((row, idx) => {
            row.querySelector('.period-label').innerText = `Period ${idx + 1}`;
        });
    }

    function calculateMulti() {
        let principal = parseFloat(document.getElementById('m-initial').value) || 0;
        const initial = principal;
        document.querySelectorAll('.m-input').forEach(input => {
            let val = parseFloat(input.value);
            if(isNaN(val)) val = 0;
            principal *= (1 + val / 100);
        });
        
        const profit = principal - initial;
        
        // Calculate Effective Total Percentage (Absolute Return)
        let effectivePct = 0;
        if (initial !== 0) {
            effectivePct = ((principal - initial) / initial) * 100;
        }

        document.getElementById('m-final').innerText = rupeeFormatter.format(principal);
        const pDisp = document.getElementById('m-profit');
        pDisp.innerText = (profit >= 0 ? '+ ' : '') + rupeeFormatter.format(profit);
        pDisp.className = 'value ' + (profit > 0 ? 'profit' : profit < 0 ? 'loss' : '');
        
        const eDisp = document.getElementById('m-effective');
        eDisp.innerText = effectivePct.toFixed(2) + '%';
        eDisp.className = 'value ' + (effectivePct > 0 ? 'profit' : effectivePct < 0 ? 'loss' : '');
    }

    function runBasic() {
        const inv = parseFloat(document.getElementById('b-invested').value) || 0;
        const pct = parseFloat(document.getElementById('b-percent').value) || 0;
        const final = inv * (1 + (pct / 100));
        const profit = final - inv;

        document.getElementById('b-final').innerText = rupeeFormatter.format(final);
        const pDisp = document.getElementById('b-profit');
        pDisp.innerText = (profit >= 0 ? '+ ' : '') + rupeeFormatter.format(profit);
        pDisp.className = 'value ' + (profit > 0 ? 'profit' : profit < 0 ? 'loss' : '');
    }

    runBasic();
    calculateMulti();
</script>
</body>
</html>
