<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Hub Mobile-Ready</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --accent: #f39c12;
            --bg: #f0f2f5;
            --card: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg); height: 100vh; overflow: hidden; }

        /* --- BURGER MENU ICON --- */
        .menu-btn {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            background: var(--primary); color: white; border: none;
            padding: 10px 12px; border-radius: 5px; cursor: pointer; font-size: 1.2rem;
        }

        /* --- SIDEBAR (Hidden by default on mobile) --- */
        .sidebar { 
            width: 250px; background: var(--primary); color: white; padding: 20px; 
            box-shadow: 2px 0 15px rgba(0,0,0,0.2); position: fixed; 
            height: 100%; left: -280px; transition: 0.3s ease; z-index: 999;
        }
        .sidebar.active { left: 0; }
        .sidebar h2 { font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 15px; margin-top: 50px; }
        
        .nav-item { padding: 12px; margin: 10px 0; cursor: pointer; border-radius: 6px; background: rgba(255,255,255,0.1); }
        .nav-item.active { background: var(--accent); font-weight: bold; }

        /* --- BACKDROP (Darkens screen when menu is open) --- */
        .backdrop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 998;
        }
        .backdrop.active { display: block; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; padding: 80px 20px 20px 20px; overflow-y: auto; display: flex; justify-content: center; }
        
        .tool-container { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); width: 100%; max-width: 400px; height: fit-content; }
        
        /* Tool UI Elements */
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        .results { margin-top: 20px; padding: 15px; background: #f8fafb; border-radius: 12px; border: 1px solid #eee; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .value { font-weight: 800; color: var(--primary); }
        .profit { color: #1b5e20; }
        .loss { color: #b71c1c; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div class="backdrop" id="backdrop" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <h2>Finance Hub</h2>
        <div class="nav-item active" onclick="toggleMenu()">Profit/Loss Calc</div>
        <div class="nav-item" style="opacity: 0.5;">More Tools Soon...</div>
    </div>

    <div class="main-content">
        <div class="tool-container">
            <h3 style="margin-top:0">Investment Calculator</h3>
            
            <div class="input-group">
                <label>Amount Invested (₹)</label>
                <input type="number" id="invested" placeholder="e.g. 50000" oninput="runCalc()">
            </div>

            <div class="input-group">
                <label>Growth/Decline (%)</label>
                <input type="number" id="percent" placeholder="e.g. 15" oninput="runCalc()">
            </div>

            <div class="results">
                <div class="result-item">
                    <span>Final Value:</span>
                    <span id="final-amount" class="value">₹0</span>
                </div>
                <div class="result-item">
                    <span>Net Profit/Loss:</span>
                    <span id="profit-value" class="value">₹0</span>
                </div>
            </div>
        </div>
    </div>

<script>
    // Toggle Sidebar Function
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('backdrop').classList.toggle('active');
    }

    // Calculator Logic
    function runCalc() {
        const invested = parseFloat(document.getElementById('invested').value) || 0;
        const percent = parseFloat(document.getElementById('percent').value) || 0;

        const finalAmount = invested * (1 + (percent / 100));
        const profit = finalAmount - invested;

        const formatter = new Intl.NumberFormat('en-IN', {
            style: 'currency', currency: 'INR', maximumFractionDigits: 0
        });

        document.getElementById('final-amount').innerText = formatter.format(finalAmount);
        
        const pDisplay = document.getElementById('profit-value');
        pDisplay.innerText = (profit >= 0 ? '+ ' : '') + formatter.format(profit);
        pDisplay.className = profit >= 0 ? 'value profit' : 'value loss';
        if(profit === 0) pDisplay.className = 'value';
    }
</script>

</body>
</html>
